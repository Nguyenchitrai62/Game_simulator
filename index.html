<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evolution Simulator 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD Top Left: Resources -->
  <div class="hud hud-top">
    <div class="resource-bar" id="resource-bar"></div>
    <div class="player-stats" id="player-stats">
      <span class="stat-atk" id="stat-atk">ATK: 1</span>
      <span class="stat-def" id="stat-def">DEF: 0</span>
      <span class="age-badge" id="age-badge">Stone Age</span>
    </div>
  </div>

  <!-- Player HP Bar (always visible, prominent during combat) -->
  <div class="player-hp-wrapper" id="player-hp-wrapper">
    <div class="player-hp-icon">&#9829;</div>
    <div class="player-hp-bar-container">
      <div class="player-hp-bar">
        <div class="player-hp-fill" id="player-hp-fill" style="width:100%"></div>
      </div>
      <div class="player-hp-text" id="player-hp-text">100 / 100</div>
    </div>
  </div>

  <!-- Context Action -->
  <div class="context-action" id="context-action">
    <span class="key">[E]</span> <span id="context-text">Chop Tree</span>
  </div>

  <!-- Combat HP bar -->
  <div class="hp-bar-container" id="combat-hp">
    <div class="hp-bar-label" id="combat-hp-label">Wolf - 15/15</div>
    <div class="hp-bar"><div class="hp-bar-fill healthy" id="combat-hp-fill" style="width:100%"></div></div>
  </div>

  <!-- Node HP bars (for harvesting) -->
  <div id="node-hp-bars-container"></div>
  
  <!-- Building Storage Labels -->
  <div id="building-storage-labels"></div>

  <!-- Backpack Icon (Bottom Left) -->
  <div class="backpack-icon" id="backpack-icon" onclick="GameHUD.toggleModal()">
    <div class="backpack-icon-inner">🎒</div>
    <div class="backpack-tooltip">Press B</div>
  </div>

  <!-- Character Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="GameHUD.closeModal()">
    <div class="modal-container" onclick="event.stopPropagation()">
      <!-- Left Side: Character + Equipment + Inventory -->
      <div class="modal-left">
        <div class="character-preview" id="character-preview">
          <canvas id="character-canvas" width="300" height="400"></canvas>
        </div>
        <div class="character-name">Player</div>
        
        <div class="equipment-section">
          <h3>Equipment</h3>
          <div class="equipment-slots" id="modal-equipment-slots"></div>
        </div>
        
        <div class="inventory-section">
          <h3>Inventory</h3>
          <div class="inventory-grid" id="modal-inventory-grid"></div>
        </div>
      </div>

      <!-- Right Side: Tabs & Content -->
      <div class="modal-right">
        <div class="modal-header">
          <div class="modal-tabs">
            <button class="modal-tab active" data-tab="resources" onclick="GameHUD.switchModalTab('resources')">
              <span class="tab-icon">💰</span> Resources
            </button>
            <button class="modal-tab" data-tab="build" onclick="GameHUD.switchModalTab('build')">
              <span class="tab-icon">🏗️</span> Build
            </button>
            <button class="modal-tab" data-tab="craft" onclick="GameHUD.switchModalTab('craft')">
              <span class="tab-icon">⚒️</span> Craft
            </button>
            <button class="modal-tab" data-tab="stats" onclick="GameHUD.switchModalTab('stats')">
              <span class="tab-icon">📊</span> Stats
            </button>
          </div>
          <button class="modal-close" onclick="GameHUD.closeModal()">✕</button>
        </div>

        <div class="modal-content">
          <div class="modal-panel active" id="modal-panel-resources"></div>
          <div class="modal-panel" id="modal-panel-build"></div>
          <div class="modal-panel" id="modal-panel-craft"></div>
          <div class="modal-panel" id="modal-panel-stats"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification -->
  <div id="notification"></div>

  <!-- Minimap -->
  <div id="minimap"><canvas id="minimap-canvas" width="116" height="116"></canvas></div>

  <!-- Building Inspector HUD -->
  <div id="building-inspector" class="hud-inspector"></div>

  <!-- Save info -->
  <div class="save-info" id="save-info"></div>

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Data Layer -->
  <script src="content/manifest.js"></script>
  <script src="content/base_stone_age.js"></script>
  <script src="content/expansion_bronze_age.js"></script>
  <script src="balance/balance.js"></script>

  <!-- Engine Core -->
  <script src="engine/registry.js"></script>
  <script src="engine/gameState.js"></script>

  <!-- Persistence -->
  <script src="storage/localStorage.js"></script>

  <!-- Game Systems -->
  <script src="engine/tickSystem.js"></script>
  <script src="engine/craftSystem.js"></script>
  <script src="engine/unlockSystem.js"></script>
  <script src="engine/upgradeSystem.js"></script>

  <!-- World -->
  <script src="world/scene.js"></script>
  <script src="world/terrain.js"></script>
  <script src="world/entities.js"></script>
  <script src="world/player.js"></script>
  <script src="world/combat.js"></script>
  <script src="world/buildingSystem.js"></script>
  <script src="world/npcSystem.js"></script>

  <!-- UI -->
  <script src="ui/hud.js"></script>

  <!-- Entry Point -->
  <script src="main.js"></script>

  <!-- Dev Tools -->
  <script src="dev/validate.js"></script>
  <script src="dev/ai_generate.js"></script>
  <script src="dev/preview.js"></script>
</body>
</html>
