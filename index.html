<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evolution Simulator 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loading-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#111;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s;">
    <div style="font-family:monospace;font-size:28px;color:#e8d8a0;margin-bottom:16px;text-shadow:0 0 20px rgba(255,200,80,0.4);">Evolution Simulator 3D</div>
    <div style="font-family:monospace;font-size:14px;color:#887750;margin-bottom:30px;">Stone Age > Bronze Age > Iron Age</div>
    <div style="width:200px;height:4px;background:#222;border-radius:2px;overflow:hidden;">
      <div id="loading-bar" style="width:0%;height:100%;background:linear-gradient(90deg,#aa8830,#ddbb44);transition:width 0.3s;border-radius:2px;"></div>
    </div>
    <div id="loading-text" style="font-family:monospace;font-size:11px;color:#665530;margin-top:12px;">Loading...</div>
  </div>
  <div id="vignette" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;background:radial-gradient(circle, transparent 60%, rgba(0,0,0,0.4) 100%);opacity:0;transition:opacity 0.5s;"></div>
  <div id="color-grade" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;opacity:0;transition:opacity 1s;mix-blend-mode:multiply;"></div>
  <canvas id="fire-light-mask" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:101;mix-blend-mode:screen;"></canvas>
  <div id="screen-flash" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:0;transition:opacity 0.2s;"></div>

  <canvas id="game-canvas"></canvas>

  <!-- HUD Top Left: Resources -->
  <div class="hud hud-top">
    <div class="resource-bar" id="resource-bar"></div>
    <div class="player-stats" id="player-stats">
      <span class="stat-atk" id="stat-atk">ATK: 1</span>
      <span class="stat-def" id="stat-def">DEF: 0</span>
      <span class="age-badge" id="age-badge">Stone Age</span>
    </div>
  </div>

  <!-- Player HP Bar (always visible, prominent during combat) -->
  <div class="player-hp-wrapper" id="player-hp-wrapper">
    <div class="player-hp-icon">&#9829;</div>
    <div class="player-hp-bar-container">
      <div class="player-hp-bar">
        <div class="player-hp-fill" id="player-hp-fill" style="width:100%"></div>
      </div>
      <div class="player-hp-text" id="player-hp-text">100 / 100</div>
    </div>
  </div>

  <!-- Hunger Bar -->
  <div class="hunger-wrapper" id="hunger-wrapper">
    <div class="hunger-icon">&#127829;</div>
    <div class="hunger-bar-container">
      <div class="hunger-bar">
        <div class="hunger-fill" id="hunger-fill" style="width:100%"></div>
      </div>
      <div class="hunger-text" id="hunger-text">100 / 100</div>
    </div>
    <button class="eat-btn" id="eat-btn" onclick="GamePlayer.startEat()">[F] An</button>
  </div>

  <!-- Day/Night Clock -->
  <div id="day-night-clock" class="day-night-clock">
    <span id="clock-time">☀ 12:00</span>
  </div>

  <!-- Context Action -->
  <div class="context-action" id="context-action">
    <span class="key">[E]</span> <span id="context-text">Chop Tree</span>
  </div>

  <!-- Combat HP bar -->
  <div class="hp-bar-container" id="combat-hp">
    <div class="hp-bar-label" id="combat-hp-label">Wolf - 15/15</div>
    <div class="hp-bar"><div class="hp-bar-fill healthy" id="combat-hp-fill" style="width:100%"></div></div>
  </div>

  <!-- Node HP bars (for harvesting) -->
  <div id="node-hp-bars-container"></div>
  
  <!-- Building Storage Labels -->
  <div id="building-storage-labels"></div>

  <!-- Backpack Icon (Bottom Left) -->
  <div class="backpack-icon" id="backpack-icon" onclick="GameHUD.toggleModal()">
    <div class="backpack-icon-inner">🎒</div>
    <div class="backpack-tooltip">Press B</div>
  </div>

  <!-- Character Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="GameHUD.closeModal()">
    <div class="modal-container" onclick="event.stopPropagation()">
      <!-- Left Side: Character + Equipment + Inventory -->
      <div class="modal-left">
        <div class="character-preview" id="character-preview">
          <canvas id="character-canvas" width="300" height="400"></canvas>
        </div>
        <div class="character-name">Player</div>
        
        <div class="equipment-section">
          <h3>Equipment</h3>
          <div class="equipment-slots" id="modal-equipment-slots"></div>
        </div>
        
        <div class="inventory-section">
          <h3>Inventory</h3>
          <div class="inventory-grid" id="modal-inventory-grid"></div>
        </div>
      </div>

      <!-- Right Side: Tabs & Content -->
      <div class="modal-right">
        <div class="modal-header">
          <div class="modal-tabs">
            <button class="modal-tab active" data-tab="resources" onclick="GameHUD.switchModalTab('resources')">
              <span class="tab-icon">💰</span> Resources
            </button>
            <button class="modal-tab" data-tab="build" onclick="GameHUD.switchModalTab('build')">
              <span class="tab-icon">🏗️</span> Build
            </button>
            <button class="modal-tab" data-tab="craft" onclick="GameHUD.switchModalTab('craft')">
              <span class="tab-icon">⚒️</span> Craft
            </button>
            <button class="modal-tab" data-tab="stats" onclick="GameHUD.switchModalTab('stats')">
              <span class="tab-icon">📊</span> Stats
            </button>
            <button class="modal-tab" data-tab="research" onclick="GameHUD.switchModalTab('research')">
              <span class="tab-icon">🔬</span> Research
            </button>
          </div>
          <button class="modal-close" onclick="GameHUD.closeModal()">✕</button>
        </div>

        <div class="modal-content">
          <div class="modal-panel active" id="modal-panel-resources"></div>
          <div class="modal-panel" id="modal-panel-build"></div>
          <div class="modal-panel" id="modal-panel-craft"></div>
          <div class="modal-panel" id="modal-panel-stats"></div>
          <div class="modal-panel" id="modal-panel-research"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification -->
  <div id="notification"></div>

  <!-- Minimap (small circular, bottom-right) -->
  <div id="minimap" onclick="MiniMap.toggleMap()"><canvas id="minimap-canvas" width="160" height="160"></canvas></div>

  <!-- Full Map Overlay -->
  <div id="map-popup" class="map-popup" style="display:none;">
    <div class="map-popup-bar">
      <span class="map-popup-title">BAN DO THE GIOI</span>
      <button class="map-close-btn" onclick="MiniMap.toggleMap()">[M] / [ESC]</button>
    </div>
    <canvas id="map-full-canvas"></canvas>
  </div>

  <!-- Building Inspector HUD -->
  <div id="building-inspector" class="hud-inspector"></div>

  <!-- Three.js (LOCAL - CDN fallback if needed) -->
  <script src="three.min.js"></script>
  <script>
    // Verify THREE.js loaded
    if (typeof THREE === 'undefined') {
      console.error('❌ THREE.js failed to load!');
      document.body.innerHTML = '<div style="color:white; padding:20px; font-size:18px;">ERROR: THREE.js failed to load. Check console.</div>';
    } else {
      console.log('✅ THREE.js loaded successfully (r' + THREE.REVISION + ')');
    }
  </script>

  <!-- Data Layer -->
  <script src="content/manifest.js"></script>
  <script src="content/base_stone_age.js"></script>
  <script src="content/expansion_bronze_age.js"></script>
  <script src="content/expansion_iron_age.js"></script>
  <script src="content/expansion_fire_light.js"></script>
  <script src="content/expansion_water.js"></script>
  <script src="balance/balance.js"></script>

  <!-- Engine Core -->
  <script src="engine/registry.js"></script>
  <script src="engine/gameState.js"></script>

  <!-- Persistence -->
  <script src="storage/localStorage.js"></script>

  <!-- Game Systems -->
  <script src="engine/tickSystem.js"></script>
  <script src="engine/craftSystem.js"></script>
  <script src="engine/unlockSystem.js"></script>
  <script src="engine/upgradeSystem.js"></script>
  <script src="engine/synergy.js"></script>
  <script src="engine/researchSystem.js"></script>

  <!-- World -->
  <script src="world/scene.js"></script>
  <script src="world/terrain.js"></script>
  <script src="world/entities.js"></script>
  <script src="world/player.js"></script>
  <script src="world/combat.js"></script>
  <script src="world/buildingSystem.js"></script>
  <script src="world/npcSystem.js"></script>
  <script src="world/rangeIndicator.js"></script>
  <script src="world/dayNightSystem.js"></script>
  <script src="world/fireSystem.js"></script>
  <script src="world/waterSystem.js"></script>
  <script src="world/atmosphere.js"></script>
  <script src="world/animationSystem.js"></script>
  <script src="world/particleSystem.js"></script>
  <script src="world/weatherSystem.js"></script>
  <script src="world/minimap.js"></script>

  <!-- UI (MUST load BEFORE main.js!) -->
  <script src="ui/hud.js"></script>

  <!-- Entry Point -->
  <script src="main.js"></script>

  <!-- Dev Tools -->
  <script src="dev/validate.js"></script>
  <script src="dev/ai_generate.js"></script>
  <script src="dev/preview.js"></script>
</body>
</html>
