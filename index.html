<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evolution Simulator 3D</title>
  <link rel="icon" type="image/png" href="asset/LOGO.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="bg-music" src="asset/Chibi.mp3" loop preload="auto"></audio>
  <audio id="lag-audio" src="asset/lag.ogg" loop preload="auto"></audio>
  <audio id="fire-sfx" src="asset/fire.ogg" preload="auto"></audio>
  <script>
    (function () {
      var music = document.getElementById('bg-music');
      var lagAudio = document.getElementById('lag-audio');
      var fireSfx = document.getElementById('fire-sfx');
      var audioUnlocked = false;
      var lagOverride = false;

      if (!music || !lagAudio || !fireSfx) return;

      music.volume = 0.4;
      lagAudio.volume = 0.75;
      fireSfx.volume = 0.82;

      function normalizeAudioPath(path) {
        return String(path || '').replace(/^\.?\//, '').replace(/^https?:\/\/[^/]+\//i, '');
      }

      function pauseAudio(audio, resetTime) {
        if (!audio) return;
        audio.pause();
        if (resetTime) {
          try {
            audio.currentTime = 0;
          } catch (error) {}
        }
      }

      function ensureAudioPath(audio, path) {
        if (!audio || !path) return audio;
        var targetPath = normalizeAudioPath(path);
        var currentPath = normalizeAudioPath(audio.getAttribute('src') || audio.currentSrc || '');
        if (currentPath === targetPath) return audio;
        audio.setAttribute('src', path);
        audio.load();
        return audio;
      }

      function syncAudioPlayback() {
        if (!audioUnlocked) return;

        if (lagOverride) {
          pauseAudio(music, false);
          if (lagAudio.paused) {
            lagAudio.play().catch(function () {});
          }
          return;
        }

        pauseAudio(lagAudio, true);
        if (music.paused) {
          music.play().catch(function () {});
        }
      }

      function unlockAudio() {
        if (audioUnlocked) return;
        audioUnlocked = true;
        syncAudioPlayback();
      }

      function playCue(path) {
        if (!audioUnlocked || !path) return false;

        var normalizedPath = normalizeAudioPath(path);
        var audio = null;

        if (normalizedPath.indexOf('fire.ogg') !== -1) {
          audio = ensureAudioPath(fireSfx, path);
        } else if (normalizedPath.indexOf('lag.ogg') !== -1) {
          audio = ensureAudioPath(lagAudio, path);
        } else if (normalizedPath.indexOf('Chibi.mp3') !== -1) {
          audio = ensureAudioPath(music, path);
        }

        if (!audio) {
          audio = ensureAudioPath(fireSfx, path);
        }

        pauseAudio(audio, true);
        audio.play().catch(function () {});
        return true;
      }

      window.GameAudioController = {
        setLagOverride: function (active, audioPath) {
          lagAudio = ensureAudioPath(lagAudio, audioPath || lagAudio.getAttribute('src') || lagAudio.currentSrc || 'asset/lag.ogg');
          lagOverride = !!active;
          syncAudioPlayback();
          return lagOverride;
        },
        playCue: playCue,
        isLagOverrideActive: function () {
          return lagOverride;
        },
        isUnlocked: function () {
          return audioUnlocked;
        }
      };

      document.addEventListener('click', unlockAudio, { once: true });
      document.addEventListener('keydown', unlockAudio, { once: true });
    })();
  </script>

  <div id="loading-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#111;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s;">
    <div style="font-family:monospace;font-size:28px;color:#e8d8a0;margin-bottom:16px;text-shadow:0 0 20px rgba(255,200,80,0.4);">Evolution Simulator 3D</div>
    <div style="font-family:monospace;font-size:14px;color:#887750;margin-bottom:30px;">Stone Age > Bronze Age > Iron Age</div>
    <div style="width:200px;height:4px;background:#222;border-radius:2px;overflow:hidden;">
      <div id="loading-bar" style="width:0%;height:100%;background:linear-gradient(90deg,#aa8830,#ddbb44);transition:width 0.3s;border-radius:2px;"></div>
    </div>
    <div id="loading-text" style="font-family:monospace;font-size:11px;color:#665530;margin-top:12px;">Loading...</div>
  </div>

  <canvas id="game-canvas"></canvas>

  <!-- HUD Top Left: Resources -->
  <div class="hud hud-top">
    <div class="resource-bar" id="resource-bar"></div>
  </div>

  <div class="objective-tracker" id="objective-tracker"></div>

  <!-- Player HP Bar (always visible, prominent during combat) -->
  <div class="player-hp-wrapper" id="player-hp-wrapper">
    <div class="player-hp-icon">&#9829;</div>
    <div class="player-hp-bar-container">
      <div class="player-hp-bar">
        <div class="player-hp-fill" id="player-hp-fill" style="width:100%"></div>
      </div>
      <div class="player-hp-text" id="player-hp-text">100 / 100</div>
    </div>
  </div>

  <!-- Hunger Bar -->
  <div class="hunger-wrapper" id="hunger-wrapper">
    <div class="hunger-icon">&#127829;</div>
    <div class="hunger-bar-container">
      <div class="hunger-bar">
        <div class="hunger-fill" id="hunger-fill" style="width:100%"></div>
      </div>
      <div class="hunger-text" id="hunger-text">100 / 100</div>
    </div>
    <button class="eat-btn" id="eat-btn" onclick="GamePlayer.startEat()" data-i18n="dom.eatButton">[F] Eat</button>
  </div>

  <!-- Day/Night Clock -->
  <div id="day-night-clock" class="day-night-clock">
    <span id="clock-time">☀ 12:00</span>
  </div>

  <div class="perf-tools" id="perf-tools">
    <button id="quality-settings-toggle" class="quality-settings-toggle" type="button" aria-expanded="false" aria-label="Settings (F9)" title="Settings (F9)" data-i18n-aria-label="dom.settingsToggleTooltip" data-i18n-title="dom.settingsToggleTooltip">
      <span class="quality-settings-toggle-text" data-i18n="dom.settingsToggle">Settings</span>
    </button>
    <div id="fps-panel" class="fps-panel">FPS --</div>
  </div>
  <div id="quality-prompt" class="quality-prompt" aria-hidden="true"></div>
  <div id="quality-settings-panel" class="quality-settings-panel" aria-hidden="true"></div>

  <!-- Context Action -->
  <div class="context-action" id="context-action">
    <span class="key">[E]</span> <span id="context-text" data-i18n="hud.contextAction.actions.gather">Gather</span>
  </div>

  <!-- Tutorial Speech Bubble (above player head) -->
  <div class="tutorial-bubble" id="tutorial-bubble">
    <span id="tutorial-bubble-text"></span>
    <span class="tutorial-bubble-arrow" id="tutorial-bubble-arrow" aria-hidden="true"></span>
  </div>

  <!-- World Speech Bubble (above animals / world objects) -->
  <div class="world-speech-bubble" id="world-speech-bubble">
    <span id="world-speech-text"></span>
  </div>

  <!-- Combat HP bar -->
  <div class="hp-bar-container" id="combat-hp">
    <div class="hp-bar-label" id="combat-hp-label">Wolf - 15/15</div>
    <div class="hp-bar"><div class="hp-bar-fill healthy" id="combat-hp-fill" style="width:100%"></div></div>
  </div>

  <!-- Node HP bars (for harvesting) -->
  <div id="node-hp-bars-container"></div>
  <div id="node-world-labels"></div>
  
  <!-- Building Storage Labels -->
  <div id="building-storage-labels"></div>

  <div class="player-basic-panel" id="player-basic-panel">
    <div class="player-basic-title" data-i18n="dom.playerPanelTitle">Player</div>
    <div class="player-basic-grid">
      <div class="player-basic-stat">
        <span class="player-basic-label" data-i18n="dom.playerBasicStats.attack">ATK</span>
        <span class="player-basic-value stat-atk" id="stat-atk">1</span>
      </div>
      <div class="player-basic-stat">
        <span class="player-basic-label" data-i18n="dom.playerBasicStats.defense">DEF</span>
        <span class="player-basic-value stat-def" id="stat-def">0</span>
      </div>
      <div class="player-basic-stat">
        <span class="player-basic-label" data-i18n="dom.playerBasicStats.speed">SPD</span>
        <span class="player-basic-value stat-spd" id="stat-spd">3</span>
      </div>
    </div>
  </div>

  <div class="quickbar" id="quickbar">
    <div class="quickbar-weapon-toggle-slot" id="quickbar-weapon-toggle"></div>
    <div class="quickbar-switch" id="quickbar-switch">
      <button class="quickbar-toggle build" id="quickbar-toggle" onclick="GameHUD.toggleQuickbarMode()">
        <span class="quickbar-toggle-label" data-i18n="hud.quickbar.mode.build">Build</span>
        <span class="quickbar-toggle-hint">Tab</span>
      </button>
    </div>
    <div class="quickbar-slots" id="quickbar-slots"></div>
    <button class="quickbar-backpack" id="quickbar-backpack" onclick="if (GameHUD.isModalActive()) { GameHUD.closeModal(); } else { GameHUD.openModal({ tab: 'resources' }); }">
      <span class="quickbar-backpack-icon">🎒</span>
      <span class="quickbar-backpack-copy">
        <span class="quickbar-backpack-label" data-i18n="dom.quickbarBagLabel">Bag</span>
        <span class="quickbar-backpack-hint" data-i18n="dom.quickbarBagHint">B</span>
      </span>
    </button>
  </div>

  <div class="weapon-switchbar" id="weapon-switchbar" style="display:none"></div>

  <!-- Character Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="GameHUD.closeModal()">
    <div class="modal-container" onclick="event.stopPropagation()">
      <!-- Left Side: Player -->
      <div class="modal-left">
        <div class="modal-player-card">
          <div class="character-preview" id="character-preview">
            <canvas id="character-canvas" width="320" height="400"></canvas>
            <div class="equipment-slots-overlay" id="modal-equipment-slots"></div>
          </div>
          <div class="modal-player-meta">
            <div class="character-name" data-i18n="dom.playerName">Player</div>
            <div class="bag-stat-chips" id="modal-player-quickstats"></div>
          </div>
        </div>
      </div>

      <!-- Right Side: Tabs & Content -->
      <div class="modal-right">
        <div class="modal-header">
          <div class="modal-header-top">
            <div class="modal-context">
              <div class="modal-kicker" id="modal-kicker" data-i18n="hud.modal.header.resources.kicker">Economy</div>
              <div class="modal-title" id="modal-title" data-i18n="hud.modal.header.resources.title">Stockpile</div>
              <div class="modal-subtitle" id="modal-subtitle" data-i18n="hud.modal.header.resources.subtitle">Track reserves, monitor income, and spot shortages before they hurt momentum.</div>
            </div>
            <button class="modal-close" onclick="GameHUD.closeModal()">✕</button>
          </div>
          <div class="modal-tabs">
            <button class="modal-tab active" data-tab="resources" type="button" onclick="GameHUD.switchModalTab('resources')">
              <span class="tab-icon">💰</span><span class="tab-label" data-i18n="dom.modalTab.resources">Resources</span>
            </button>
            <button class="modal-tab" data-tab="build" type="button" onclick="GameHUD.switchModalTab('build')">
              <span class="tab-icon">🏗️</span><span class="tab-label" data-i18n="dom.modalTab.build">Build</span>
            </button>
            <button class="modal-tab" data-tab="craft" type="button" onclick="GameHUD.switchModalTab('craft')">
              <span class="tab-icon">⚒️</span><span class="tab-label" data-i18n="dom.modalTab.craft">Craft</span>
            </button>
            <button class="modal-tab" data-tab="stats" type="button" onclick="GameHUD.switchModalTab('stats')">
              <span class="tab-icon">📊</span><span class="tab-label" data-i18n="dom.modalTab.stats">Stats</span>
            </button>
            <button class="modal-tab" data-tab="research" type="button" onclick="GameHUD.switchModalTab('research')">
              <span class="tab-icon">🔬</span><span class="tab-label" data-i18n="dom.modalTab.research">Research</span>
            </button>
          </div>
        </div>

        <div class="modal-content">
          <div class="modal-panel active" id="modal-panel-resources"></div>
          <div class="modal-panel" id="modal-panel-build"></div>
          <div class="modal-panel" id="modal-panel-craft"></div>
          <div class="modal-panel" id="modal-panel-stats"></div>
          <div class="modal-panel" id="modal-panel-research"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification -->
  <div id="notification"></div>

  <!-- Minimap (small circular, bottom-right) -->
  <div id="minimap" onclick="MiniMap.toggleMap()"><canvas id="minimap-canvas" width="160" height="160"></canvas></div>

  <!-- Full Map Overlay -->
  <div id="map-popup" class="map-popup" style="display:none;">
    <div class="map-popup-bar">
      <span class="map-popup-title" data-i18n="dom.mapTitle">WORLD MAP</span>
      <button class="map-close-btn" onclick="MiniMap.toggleMap()">[M] / [ESC]</button>
    </div>
    <canvas id="map-full-canvas"></canvas>
  </div>

  <!-- Building Inspector HUD -->
  <div id="building-inspector" class="hud-inspector"></div>

  <!-- Three.js (LOCAL - CDN fallback if needed) -->
  <script src="three.min.js"></script>
  <script>
    // Verify THREE.js loaded
    if (typeof THREE === 'undefined') {
      console.error('❌ THREE.js failed to load!');
      document.body.innerHTML = '<div style="color:white; padding:20px; font-size:18px;">ERROR: THREE.js failed to load. Check console.</div>';
    } else {
      console.log('✅ THREE.js loaded successfully (r' + THREE.REVISION + ')');
    }
  </script>

  <script src="content/expansion_water.js"></script>
  <script src="content/expansion_military_defense.js"></script>
  <script src="content/expansion_hunt_prey.js"></script>
  <script src="content/expansion_military_upgrades.js"></script>
  <script src="content/expansion_ranged_weapons.js"></script>
  <script src="content/expansion_boss_frontier.js"></script>
  <script src="balance/balance.js"></script>
  <script src="ui/i18n.js"></script>

  <script src="engine/registry.js"></script>
  <script src="engine/gameState.js"></script>
  <script src="engine/perfMonitor.js"></script>
  <script src="engine/qualitySettings.js"></script>
  <script src="engine/spatialIndex.js"></script>

  <!-- Persistence -->
  <script src="storage/localStorage.js"></script>

  <script src="engine/tickSystem.js"></script>
  <script src="engine/craftSystem.js"></script>
  <script src="engine/unlockSystem.js"></script>
  <script src="engine/upgradeSystem.js"></script>
  <script src="engine/synergy.js"></script>
  <script src="engine/researchSystem.js"></script>

  <!-- World -->
  <script src="world/scene.js"></script>
  <script src="world/terrain.js"></script>
  <script src="world/entities.js"></script>
  <script src="world/player.js"></script>
  <script src="world/combat.js"></script>
  <script src="world/buildingSystem.js"></script>
  <script src="world/npcSystem.js"></script>
  <script src="world/barracksTroopSystem.js"></script>
  <script src="world/rangeIndicator.js"></script>
  <script src="world/dayNightSystem.js"></script>
  <script src="world/fireSystem.js"></script>
  <script src="world/waterSystem.js"></script>
  <script src="world/atmosphere.js"></script>
  <script src="world/animationSystem.js"></script>
  <script src="world/particleSystem.js"></script>
  <script src="world/weatherSystem.js"></script>
  <script src="world/minimap.js"></script>

  <!-- UI (MUST load BEFORE main.js!) -->

  <script src="ui/hud/settingsPanel.js"></script>
  <script src="ui/hud/modalPanels.js"></script>
  <script src="ui/hud/inspector.js"></script>
  <script src="ui/hud.js"></script>

  <!-- Entry Point -->
  <script src="main.js"></script>
  <script src="dev/localCheatLoader.js"></script>
</body>
